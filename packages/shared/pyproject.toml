[project]
name = "shared"
version = "0.1.0"
description = "Shared modules visible to all projects in the workspace."
readme = "README.md"
authors = [
    { name = "fhassis", email = "fhassis2@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "msgspec>=0.21.1",
    "opentelemetry-api>=1.41.1",
    "structlog>=25.5.0",
]

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
