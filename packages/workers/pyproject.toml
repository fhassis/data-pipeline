[project]
name = "workers"
version = "0.1.0"
description = "Application's background workers."
readme = "README.md"
authors = [
    { name = "fhassis", email = "fhassis2@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "asyncpg>=0.31.0",
    "nats-py>=2.14.0",
    "shared",
    "uvloop>=0.22.1",
]

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
shared = { workspace = true }
